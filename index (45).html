<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPTOR SNIPER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap');

:root {
  --bg:      #f5f4f0;
  --surface: #ffffff;
  --border:  #e0ddd6;
  --text:    #1a1816;
  --muted:   #7a766e;
  --buy:     #1a6b3a;
  --buy-bg:  #e8f5ed;
  --exit:    #8b1a1a;
  --exit-bg: #faeaea;
  --tag-bg:  #eeece7;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; }

header {
  padding: 24px 32px 18px;
  border-bottom: 1.5px solid var(--border);
  display: flex; align-items: baseline; gap: 16px;
}
header h1 { font-family: var(--sans); font-size: 20px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
header .sub { font-size: 11px; color: var(--muted); letter-spacing: .04em; }
#last-update { margin-left: auto; font-size: 11px; color: var(--muted); }

.filters {
  padding: 12px 32px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.flabel { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-right: 2px; }
.chip {
  padding: 3px 10px; border: 1px solid var(--border); border-radius: 2px;
  background: var(--surface); font-family: var(--mono); font-size: 11px;
  cursor: pointer; transition: all .1s; color: var(--text);
}
.chip:hover { background: var(--tag-bg); }
.chip.active { background: var(--text); color: #fff; border-color: var(--text); }
.chip.buy.active  { background: var(--buy);  border-color: var(--buy); }
.chip.exit.active { background: var(--exit); border-color: var(--exit); }
.sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }

main { max-width: 1080px; margin: 0 auto; padding: 20px 32px; }
#count-bar { font-size: 11px; color: var(--muted); margin-bottom: 12px; }

.event {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--surface);
  margin-bottom: 3px;
  transition: border-color .1s;
}
.event:hover { border-color: #aaa; }

.badge {
  display: block; padding: 2px 0; border-radius: 2px;
  font-size: 10px; font-weight: 700; letter-spacing: .05em; text-align: center;
}
.badge.buy  { background: var(--buy-bg);  color: var(--buy); }
.badge.exit { background: var(--exit-bg); color: var(--exit); }

.info { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
.ticker { font-weight: 700; font-size: 13px; white-space: nowrap; }
.score  { font-size: 10px; color: var(--muted); white-space: nowrap; }
.name   { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
.tag    { font-size: 10px; padding: 1px 6px; background: var(--tag-bg); border-radius: 2px; white-space: nowrap; text-transform: uppercase; letter-spacing: .04em; }
.dates  { font-size: 10px; color: var(--muted); white-space: nowrap; }

.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 11px; border: 1px solid var(--border); border-radius: 2px;
  background: var(--surface); font-family: var(--mono); font-size: 11px;
  color: var(--text); text-decoration: none; white-space: nowrap; transition: all .1s;
}
.btn:hover { background: var(--text); color: #fff; border-color: var(--text); }

#loading { text-align: center; padding: 60px; color: var(--muted); font-size: 12px; }
#empty   { display:none; text-align:center; padding:60px; color:var(--muted); font-size:12px; }
#err     { display:none; padding:10px 14px; background:var(--exit-bg); color:var(--exit); border:1px solid #e8b0b0; border-radius:2px; margin-bottom:14px; font-size:12px; }

@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.blink{animation:blink 1.2s infinite}

@media(max-width:660px){
  header,.filters,main{padding-left:14px;padding-right:14px;}
  .event{grid-template-columns:68px 1fr auto;gap:8px;padding:8px 8px;}
  .name{max-width:160px;}
}
</style>
</head>
<body>

<header>
  <div>
    <h1>⚡ Raptor Sniper</h1>
    <div class="sub">aggregatore segnali · ultimi 30 giorni</div>
  </div>
  <span id="last-update">—</span>
</header>

<div class="filters">
  <span class="flabel">segnale</span>
  <button class="chip active" data-f="signal" data-v="all">Tutti</button>
  <button class="chip buy"   data-f="signal" data-v="BUY">BUY</button>
  <button class="chip exit"  data-f="signal" data-v="EXIT">EXIT</button>
  <div class="sep"></div>
  <span class="flabel">fonte</span>
  <button class="chip active" data-f="source" data-v="all">Tutti</button>
  <button class="chip" data-f="source" data-v="chart">Chart</button>
  <button class="chip" data-f="source" data-v="one">One</button>
  <button class="chip" data-f="source" data-v="alert">Alert</button>
  <button class="chip" data-f="source" data-v="settoriali">Settoriali</button>
  <button class="chip" data-f="source" data-v="tematici">Tematici</button>
  <button class="chip" data-f="source" data-v="geografia">Geografia</button>
  <button class="chip" data-f="source" data-v="scannerv2">Scanner</button>
</div>

<main>
  <div id="err"></div>
  <div id="count-bar"></div>
  <div id="loading"><span class="blink">caricamento...</span></div>
  <div id="list"></div>
  <div id="empty">Nessun segnale per i filtri selezionati.</div>
</main>

<script>
const SIGNALS_URL = 'signals.json';
const SOURCE_PAGES = {
  chart:      'https://giorgiogoldoni.github.io/chart/',
  one:        'https://giorgiogoldoni.github.io/raptor-one/',
  alert:      'https://giorgiogoldoni.github.io/raptor-alert/',
  settoriali: 'https://giorgiogoldoni.github.io/raptor-settoriali/',
  tematici:   'https://giorgiogoldoni.github.io/raptor-tematici/',
};

let all = [], fSig = 'all', fSrc = 'all';

async function load() {
  try {
    const r = await fetch(SIGNALS_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    all = await r.json();
    document.getElementById('loading').style.display = 'none';
    if (all.length) {
      document.getElementById('last-update').textContent =
        'aggiornato ' + fmtDT(all[0].detected_at);
    }
    render();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('err');
    el.style.display = 'block';
    el.textContent = 'Impossibile caricare signals.json — ' + e.message;
    render();
  }
}

function render() {
  const data = all.filter(ev =>
    (fSig === 'all' || ev.signal === fSig) &&
    (fSrc === 'all' || ev.source === fSrc)
  );
  const cb = document.getElementById('count-bar');
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');

  cb.textContent = data.length + ' eventi' +
    (all.length !== data.length ? ' (su ' + all.length + ' totali)' : '');

  if (!data.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  list.innerHTML = data.map(ev => {
    const sc = ev.signal === 'BUY' ? 'buy' : 'exit';
    const raw = ev.raw_signal || ev.signal;
    const base = ev.page_url || SOURCE_PAGES[ev.source] || '#';
    const url = base + (base.includes('?') ? '&' : '?') + 'ticker=' + encodeURIComponent(ev.ticker);
    const d1 = ev.signal_date ? 'entrato ' + fmtD(ev.signal_date) + ' · ' : '';
    const extra = ev.portfolio
      ? `<span class="tag">${h(ev.portfolio)}</span>`
      : ev.group
        ? `<span class="tag">${h(ev.group.replace('_',' '))}</span>`
        : '';
    return `<div class="event">
      <span class="badge ${sc}">${h(raw)}</span>
      <div class="info">
        <span class="ticker">${h(ev.ticker)}</span>
        ${ev.score != null ? `<span class="score">score&nbsp;${ev.score}</span>` : ''}
        <span class="name">${h(ev.name)}</span>
        <span class="tag">${h(ev.source)}</span>
        ${extra}
        <span class="dates">${d1}rilevato ${fmtDT(ev.detected_at)}</span>
      </div>
      <a class="btn" href="${h(url)}" target="_blank" rel="noopener">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1 9L9 1M9 1H4M9 1V6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>vai
      </a>
    </div>`;
  }).join('');
}

document.querySelectorAll('.chip[data-f]').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.f, v = btn.dataset.v;
    if (f === 'signal') fSig = v;
    if (f === 'source') fSrc = v;
    document.querySelectorAll(`.chip[data-f="${f}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

function h(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtDT(iso) {
  try {
    return new Date(iso).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Rome'});
  } catch{ return iso||'—'; }
}
function fmtD(s) {
  if(!s) return '';
  try {
    if(/^\d{2}\/\d{2}\/\d{4}/.test(s)) return s.slice(0,10);
    return new Date(s).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  } catch{ return s; }
}

load();
</script>
</body>
</html>
