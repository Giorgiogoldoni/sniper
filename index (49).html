<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPTOR SNIPER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap');
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e0ddd6;--text:#1a1816;
  --muted:#7a766e;--buy:#1a6b3a;--buy-bg:#e8f5ed;
  --exit:#8b1a1a;--exit-bg:#faeaea;--tag:#eeece7;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;min-height:100vh}

/* HEADER */
header{padding:18px 28px 12px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--surface)}
header h1{font-family:var(--sans);font-size:18px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.sub{font-size:10px;color:var(--muted)}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px}
#last-update{font-size:10px;color:var(--muted)}

/* METRICHE */
.metrics{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface)}
.metric{flex:1;padding:10px 16px;border-right:1px solid var(--border)}
.metric:last-child{border-right:none}
.metric .val{font-size:20px;font-weight:700;line-height:1}
.metric .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.metric.buy .val{color:var(--buy)}
.metric.exit .val{color:var(--exit)}

/* FILTRI */
.filters{padding:8px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;flex-wrap:wrap;background:var(--surface)}
.flabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
.chip{padding:2px 8px;border:1px solid var(--border);border-radius:2px;background:var(--surface);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .1s;color:var(--text)}
.chip:hover{background:var(--tag)}
.chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.chip.buy.active{background:var(--buy);border-color:var(--buy)}
.chip.exit.active{background:var(--exit);border-color:var(--exit)}
.sep{width:1px;height:14px;background:var(--border);margin:0 4px}

/* TABELLA */
main{padding:16px 28px}
#count-bar{font-size:10px;color:var(--muted);margin-bottom:8px}

.tbl-header{
  display:grid;
  grid-template-columns:72px 80px 90px 90px 80px 80px 1fr;
  gap:0;
  padding:5px 12px;
  font-size:9px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.06em;
  border-bottom:1.5px solid var(--border);
  background:var(--surface);
  position:sticky;top:0;z-index:10;
}

.event{border:1px solid var(--border);border-radius:2px;background:var(--surface);margin-bottom:3px}
.event:hover{border-color:#bbb}

.event-row{
  display:grid;
  grid-template-columns:72px 80px 90px 90px 80px 80px 1fr;
  gap:0;
  align-items:center;
  padding:7px 12px;
  cursor:pointer;
  min-height:36px;
}
.event-row > *{padding:0 4px}

/* Colonne */
.col-ticker{font-weight:700;font-size:13px;white-space:nowrap}
.col-nome{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.col-segnale{}
.badge{display:inline-block;padding:2px 7px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:.04em}
.badge.buy{background:var(--buy-bg);color:var(--buy)}
.badge.exit{background:var(--exit-bg);color:var(--exit)}
.col-data-seg{font-size:11px;font-weight:600;white-space:nowrap}
.col-rilevato{font-size:10px;color:var(--muted);white-space:nowrap}
.col-fonte{display:flex;gap:3px;flex-wrap:wrap}
.stag{font-size:9px;padding:1px 5px;background:var(--tag);border-radius:2px;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
.col-motivi{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:space-between}
.motivi-pills{display:flex;gap:4px;flex-wrap:wrap;font-size:9px;color:var(--muted)}
.pill{white-space:nowrap}
.pill.ok{color:var(--buy)}
.pill.ko{color:var(--exit)}
.row-actions{display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0}

/* Dettaglio */
.event-detail{display:none;padding:10px 14px 12px;border-top:1px solid var(--border);background:#fafaf8}
.event-detail.open{display:block}

.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;margin-bottom:10px}
.detail-item{font-size:10px}
.detail-item .dk{color:var(--muted);display:block;font-size:9px;text-transform:uppercase;letter-spacing:.04em}
.detail-item .dv{font-weight:600;color:var(--text)}
.detail-item .dv.ok{color:var(--buy)}
.detail-item .dv.ko{color:var(--exit)}

.src-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

/* Bottoni */
.btn{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border:1px solid var(--border);border-radius:2px;background:var(--surface);font-family:var(--mono);font-size:10px;color:var(--text);text-decoration:none;white-space:nowrap;transition:all .1s;cursor:pointer}
.btn:hover{background:var(--text);color:#fff;border-color:var(--text)}
.toggle{font-size:10px;color:var(--muted);border:none;background:none;cursor:pointer;font-family:var(--mono);padding:2px 4px;flex-shrink:0}
.toggle:hover{color:var(--text)}

/* Stati */
#loading{text-align:center;padding:60px;color:var(--muted);font-size:12px}
#empty{display:none;text-align:center;padding:60px;color:var(--muted);font-size:12px}
#err{display:none;padding:10px 14px;background:var(--exit-bg);color:var(--exit);border:1px solid #e8b0b0;border-radius:2px;margin-bottom:12px;font-size:11px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.blink{animation:blink 1.2s infinite}

@media(max-width:900px){
  .tbl-header,.event-row{grid-template-columns:60px 70px 80px 80px 70px 70px 1fr}
}
@media(max-width:680px){
  header,.filters,main{padding-left:12px;padding-right:12px}
  .tbl-header,.event-row{grid-template-columns:55px 65px 70px 72px 60px 60px 1fr;font-size:10px}
  .col-nome{display:none}
  .metrics{flex-wrap:wrap}
  .metric{min-width:100px}
}
</style>
</head>
<body>

<header>
  <div>
    <h1>⚡ Raptor Sniper</h1>
    <div class="sub">aggregatore segnali · ultimi 30 giorni</div>
  </div>
  <div class="hright">
    <span id="last-update">—</span>
    <button class="btn" onclick="exportCSV()">⬇ Excel</button>
  </div>
</header>

<div class="metrics">
  <div class="metric buy"><div class="val" id="m-buy">—</div><div class="lbl">BUY oggi</div></div>
  <div class="metric exit"><div class="val" id="m-exit">—</div><div class="lbl">EXIT oggi</div></div>
  <div class="metric"><div class="val" id="m-tot">—</div><div class="lbl">Totale 30gg</div></div>
  <div class="metric"><div class="val" id="m-multi">—</div><div class="lbl">Multi-fonte</div></div>
  <div class="metric"><div class="val" id="m-src">—</div><div class="lbl">Fonte + attiva</div></div>
</div>

<div class="filters">
  <span class="flabel">segnale</span>
  <button class="chip active" data-f="signal" data-v="all">Tutti</button>
  <button class="chip buy"   data-f="signal" data-v="BUY">BUY</button>
  <button class="chip exit"  data-f="signal" data-v="EXIT">EXIT</button>
  <div class="sep"></div>
  <span class="flabel">fonte</span>
  <button class="chip active" data-f="source" data-v="all">Tutti</button>
  <button class="chip" data-f="source" data-v="chart">Chart</button>
  <button class="chip" data-f="source" data-v="one">One</button>
  <button class="chip" data-f="source" data-v="alert">Alert</button>
  <button class="chip" data-f="source" data-v="settoriali">Settoriali</button>
  <button class="chip" data-f="source" data-v="tematici">Tematici</button>
  <button class="chip" data-f="source" data-v="geografia">Geografia</button>
  <button class="chip" data-f="source" data-v="scannerv2">Scanner</button>
</div>

<main>
  <div id="err"></div>
  <div id="count-bar"></div>
  <div class="tbl-header">
    <div>Ticker</div>
    <div>Nome</div>
    <div>Segnale</div>
    <div>Data segnale</div>
    <div>Rilevato</div>
    <div>Fonte</div>
    <div>Motivi</div>
  </div>
  <div id="loading"><span class="blink">caricamento...</span></div>
  <div id="list"></div>
  <div id="empty">Nessun segnale per i filtri selezionati.</div>
</main>

<script>
const SIGNALS_URL = 'signals.json';
let all = [], fSig = 'all', fSrc = 'all';

async function load() {
  try {
    const r = await fetch(SIGNALS_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    all = await r.json();
    document.getElementById('loading').style.display = 'none';
    updateMetrics();
    render();
    if (all.length) document.getElementById('last-update').textContent = 'aggiornato ' + fmtDT(all[0].detected_at);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('err');
    el.style.display = 'block';
    el.textContent = 'Impossibile caricare signals.json — ' + e.message;
  }
}

function updateMetrics() {
  const today = new Date().toISOString().slice(0,10);
  let buyOggi=0, exitOggi=0, multi=0;
  const srcCount = {};
  all.forEach(ev => {
    const d = ev.detected_at.slice(0,10);
    if (d===today && ev.signal==='BUY') buyOggi++;
    if (d===today && ev.signal==='EXIT') exitOggi++;
    if ((ev.sources||[]).length > 1) multi++;
    (ev.sources||[]).forEach(s => { srcCount[s.source]=(srcCount[s.source]||0)+1; });
  });
  const topSrc = Object.entries(srcCount).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('m-buy').textContent  = buyOggi;
  document.getElementById('m-exit').textContent = exitOggi;
  document.getElementById('m-tot').textContent  = all.length;
  document.getElementById('m-multi').textContent= multi;
  document.getElementById('m-src').textContent  = topSrc ? topSrc[0] : '—';
}

function render() {
  const data = all.filter(ev => {
    const srcs = (ev.sources||[]).map(s=>s.source);
    if (fSig!=='all' && ev.signal!==fSig) return false;
    if (fSrc!=='all' && !srcs.includes(fSrc)) return false;
    return true;
  });
  document.getElementById('count-bar').textContent =
    data.length + ' eventi' + (all.length!==data.length ? ' (su '+all.length+' totali)' : '');
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  if (!data.length) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  list.innerHTML = data.map((ev,i) => buildRow(ev,i)).join('');
}

function buildRow(ev, idx) {
  const sc = ev.signal==='BUY'?'buy':'exit';
  const sources = ev.sources||[];
  const primarySrc = sources[0]||{};
  const sigDate = fmtD(ev.signal_date);
  const detDate = fmtDT(ev.detected_at);
  const srcTags = sources.map(s=>`<span class="stag">${h(s.source)}</span>`).join('');
  const pills = buildPills(sources);
  const gotoUrl = (primarySrc.page_url||'#') + ((primarySrc.page_url||'').includes('?')?'&':'?') + 'ticker=' + encodeURIComponent(ev.ticker);

  return `<div class="event" id="ev${idx}">
    <div class="event-row" onclick="toggleDetail(${idx})">
      <div class="col-ticker">${h(ev.ticker)}</div>
      <div class="col-nome" title="${h(ev.name)}">${h(ev.name)}</div>
      <div class="col-segnale"><span class="badge ${sc}">${h(primarySrc.raw_signal||ev.signal)}</span></div>
      <div class="col-data-seg">${sigDate}</div>
      <div class="col-rilevato">${detDate}</div>
      <div class="col-fonte">${srcTags}</div>
      <div class="col-motivi">
        <div class="motivi-pills">${pills}</div>
        <div class="row-actions">
          <a class="btn" href="${h(gotoUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
            <svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M1 9L9 1M9 1H4M9 1V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>vai
          </a>
          <button class="toggle" id="tog${idx}">▾</button>
        </div>
      </div>
    </div>
    <div class="event-detail" id="det${idx}">${buildDetail(ev)}</div>
  </div>`;
}

// Pills abbreviate per riga
function buildPills(sources) {
  const pills = [];
  sources.forEach(src => {
    const ex = src.extra||{};
    // SAR
    if (ex.sar_bull!==undefined) pills.push(`<span class="pill ${ex.sar_bull?'ok':'ko'}">SAR${ex.sar_bull?'↑':'↓'}</span>`);
    else if (ex.sar_up!==undefined) pills.push(`<span class="pill ${ex.sar_up?'ok':'ko'}">SAR${ex.sar_up?'↑':'↓'}</span>`);
    // AO
    if (ex.ao!==undefined) pills.push(`<span class="pill ${ex.ao>0?'ok':'ko'}">AO ${ex.ao>0?'+':''}${fmtN(ex.ao,2)}</span>`);
    else if (ex.ao_pos!==undefined) pills.push(`<span class="pill ${ex.ao_pos?'ok':'ko'}">AO${ex.ao_pos?'+':'-'}</span>`);
    // RSI
    if (ex.rsi!==undefined) pills.push(`<span class="pill ${ex.rsi>50?'ok':'ko'}">RSI ${fmtN(ex.rsi,1)}</span>`);
    // ER
    if (ex.er!==undefined) pills.push(`<span class="pill">ER ${fmtN(ex.er,2)}</span>`);
    // KAMA
    if (ex.kama_trend) pills.push(`<span class="pill ${ex.kama_trend==='VERDE'?'ok':ex.kama_trend==='ROSSO'?'ko':''}">KAMA ${ex.kama_trend}</span>`);
    // BAFF
    if (ex.baff!==undefined) pills.push(`<span class="pill ${ex.baff>=3?'ok':'ko'}">Baff ${ex.baff}</span>`);
    // TREND
    if (ex.trend) pills.push(`<span class="pill ${ex.trend==='VERDE'?'ok':ex.trend==='ROSSO'?'ko':''}">Trend ${ex.trend}</span>`);
    // Trendycator
    if (ex.trendycator) pills.push(`<span class="pill ${ex.trendycator==='VERDE'?'ok':ex.trendycator==='ROSSO'?'ko':''}">Tcy ${ex.trendycator}</span>`);
  });
  // Dedup e limita a 6 pill per non sovraffollare
  const seen = new Set();
  return pills.filter(p=>{ if(seen.has(p)) return false; seen.add(p); return true; }).slice(0,6).join(' ');
}

// Dettaglio espanso
function buildDetail(ev) {
  const sources = ev.sources||[];
  let html = '';

  sources.forEach(src => {
    const ex = src.extra||{};
    html += `<div style="margin-bottom:10px">
      <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:700">${src.source} · ${src.raw_signal}</div>
      <div class="detail-grid">`;

    // Prezzo
    const price = src.price ?? ev.price;
    if (price!=null) html += detItem('Ultimo prezzo', price, null);

    // Tutti i campi extra numerici/booleani
    const fieldMap = {
      rsi:          ['RSI', null],
      ao:           ['AO', null],
      er:           ['ER (Efficiency)', null],
      baff:         ['Baff AO', null],
      adx:          ['ADX', null],
      hurst_60:     ['Hurst 60gg', null],
      composite_score: ['Score comp.', null],
      vol_ratio:    ['Volume ratio', null],
      mom1m:        ['Mom 1M%', null],
      mom3m:        ['Mom 3M%', null],
      mom6m:        ['Mom 6M%', null],
      bb_width:     ['BB Width', null],
      tv_rating:    ['TV Rating', null],
      tv_buy:       ['TV Buy', null],
      tv_sell:      ['TV Sell', null],
      regime:       ['Regime', null],
      kama_trend:   ['KAMA trend', null],
      trendycator:  ['Trendycator', null],
      vol_class:    ['Vol class', null],
      categoria:    ['Categoria', null],
      current_gain_pct: ['Gain%', null],
      days_held:    ['Giorni pos.', null],
      target_price: ['Target', null],
      stop_loss:    ['Stop loss', null],
      size_pct:     ['Size%', null],
      pk_pct:       ['% dal picco', null],
      portfolio:    ['Portfolio', null],
      group:        ['Gruppo', null],
      sar_bull:     ['SAR rialzista', 'bool'],
      sar_up:       ['SAR rialzista', 'bool'],
      ao_rising:    ['AO in salita', 'bool'],
      rvi_bull:     ['RVI rialzista', 'bool'],
      ao_pos:       ['AO positivo', 'bool'],
      mm_align:     ['MM allineate', 'bool'],
      pre_alert:    ['Pre-alert', 'bool'],
      target_hit:   ['Target hit', 'bool'],
      is_leveraged: ['Leva', 'bool'],
    };

    Object.entries(fieldMap).forEach(([key,[label,type]]) => {
      if (ex[key]==null) return;
      html += detItem(label, ex[key], type);
    });

    html += `</div></div>`;
  });

  // Link multipli
  if (sources.length > 1) {
    html += `<div class="src-links">`;
    sources.forEach(src => {
      const url = (src.page_url||'#') + ((src.page_url||'').includes('?')?'&':'?') + 'ticker=' + encodeURIComponent(ev.ticker);
      html += `<a class="btn" href="${h(url)}" target="_blank" rel="noopener">↗ ${src.source}</a>`;
    });
    html += `</div>`;
  }

  return html || '<div style="font-size:10px;color:var(--muted)">Nessun dettaglio disponibile</div>';
}

function detItem(label, val, type) {
  let cls = '';
  let display = val;
  if (type==='bool') {
    cls = val ? 'ok' : 'ko';
    display = val ? 'Sì ✓' : 'No ✗';
  } else if (typeof val === 'number') {
    display = Number.isInteger(val) ? val : val.toFixed(2);
  }
  return `<div class="detail-item"><span class="dk">${label}</span><span class="dv ${cls}">${display}</span></div>`;
}

function toggleDetail(idx) {
  const det = document.getElementById('det'+idx);
  const tog = document.getElementById('tog'+idx);
  det.classList.toggle('open');
  tog.textContent = det.classList.contains('open')?'▴':'▾';
}

// FILTRI
document.querySelectorAll('.chip[data-f]').forEach(btn => {
  btn.addEventListener('click', () => {
    const f=btn.dataset.f, v=btn.dataset.v;
    if(f==='signal') fSig=v;
    if(f==='source') fSrc=v;
    document.querySelectorAll(`.chip[data-f="${f}"]`).forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// EXPORT CSV
function exportCSV() {
  const data = all.filter(ev => {
    const srcs=(ev.sources||[]).map(s=>s.source);
    if(fSig!=='all' && ev.signal!==fSig) return false;
    if(fSrc!=='all' && !srcs.includes(fSrc)) return false;
    return true;
  });
  if(!data.length){alert("Nessun dato da esportare.");return;}
  const headers=["Ticker","Nome","Segnale","Score","Prezzo","Fonti","Data Segnale","Rilevato"];
  const rows=[headers.join(";")];
  data.forEach(ev=>{
    const srcs=(ev.sources||[]).map(s=>s.source).join('+');
    rows.push([ev.ticker,ev.name,ev.signal,ev.score??'',ev.price??'',srcs,ev.signal_date||'',ev.detected_at]
      .map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(";"));
  });
  const blob=new Blob(["\uFEFF"+rows.join("\n")],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="sniper_"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
}

// UTILITY
function h(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtN(v,d){return typeof v==='number'?v.toFixed(d):v;}
function fmtDT(iso){try{return new Date(iso).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Rome'});}catch{return iso||'—';}}
function fmtD(s){
  if(!s||s===null||s==='null') return '—';
  s=String(s);
  if(s==='0'||s==='') return '—';
  try{
    if(/^\d{2}\/\d{2}\/\d{4}/.test(s)) return s.slice(0,10);
    const d=new Date(s);
    if(isNaN(d.getTime())||d.getFullYear()<2000) return '—';
    return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  }catch{return s;}
}

load();
</script>
</body>
</html>
