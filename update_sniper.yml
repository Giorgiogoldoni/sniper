name: Sniper Update

on:
  schedule:
    # 4x al giorno lun-ven (CEST ora legale): 10:00 · 12:00 · 16:00 · 18:30
    - cron: '0 8 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '30 16 * * 1-5'
  workflow_dispatch:

jobs:
  sniper:
    name: Sniper Update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy --break-system-packages -q

      - name: Run Sniper
        run: python sniper.py

      - name: Commit & push
        run: |
          git config user.name  "raptor-bot"
          git config user.email "raptor-bot@users.noreply.github.com"
          git add signals.json
          git diff --staged --quiet || git commit -m "sniper: update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
