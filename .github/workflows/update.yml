name: Sniper Update

on:
  schedule:
    - cron: '15 7 * * 1-5'   # 09:15 CET
    - cron: '0 10 * * 1-5'   # 12:00 CET
    - cron: '0 14 * * 1-5'   # 16:00 CET
    - cron: '30 16 * * 1-5'  # 18:30 CET
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sniper
        run: python sniper.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add signals.json
          git diff --cached --quiet || git commit -m "sniper: update signals $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
