name: Portafoglio Update

on:
  schedule:
    # 4x al giorno lun-ven (CEST ora legale): 10:00 · 12:00 · 16:00 · 18:30
    - cron: '0 8 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '30 16 * * 1-5'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job da eseguire'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - macro
          - portfolio

jobs:
  # ── MACRO CLASSIFIER (ETF-based) ──────────────────────────
  macro:
    name: Macro Classifier
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'macro' || github.event.inputs.job == 'both'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests --break-system-packages -q

      - name: Run Macro Classifier
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          PAGES_URL:          https://giorgiogoldoni.github.io/portafoglio/
        run: python scripts/update.py

      - name: Commit & push
        run: |
          git config user.name  "raptor-bot"
          git config user.email "raptor-bot@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "🔮 Macro update — $(date -u +'%d/%m/%Y %H:%M') UTC"
          git push

  # ── PORTFOLIO OPTIMIZER ────────────────────────────────────
  portfolio:
    name: Portfolio Optimizer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    needs: macro
    if: |
      always() && (
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'portfolio' || github.event.inputs.job == 'both'))
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy --break-system-packages -q

      - name: Run Portfolio Optimizer
        run: python update_portfolio.py

      - name: Commit & push
        run: |
          git config user.name  "raptor-bot"
          git config user.email "raptor-bot@users.noreply.github.com"
          git add data/portfolio.json
          git diff --staged --quiet || git commit -m "📐 Portfolio update — $(date -u +'%d/%m/%Y %H:%M') UTC"
          git push
